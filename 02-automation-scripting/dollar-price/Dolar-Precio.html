<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dólar Actualizado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2c3e50;
    }
    #precio {
      font-size: 2.5em;
      font-weight: bold;
      color: #27ae60;
      margin: 20px 0;
    }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1.1em;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }
    .loading {
      color: #7f8c8d;
      font-style: italic;
    }
    .error {
      color: #e74c3c;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #7f8c8d;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Dólar Blue Hoy</h1>
    <div id="precio" class="loading">Cargando...</div>
    <button onclick="actualizarDolar()">Actualizar Precio</button>
    <div class="footer">Fuente: <a href="https://dolarapi.com" target="_blank">dolarapi.com</a></div>
  </div>

  <script>
    // Función para obtener y mostrar el dólar
    async function actualizarDolar() {
      const precioElement = document.getElementById('precio');
      precioElement.textContent = 'Cargando...';
      precioElement.className = 'loading';

      try {
        const response = await fetch('https://dolarapi.com/v1/dolares/blue');
        if (!response.ok) throw new Error('Error en la API');

        const data = await response.json();

        const compra = data.compra.toFixed(2);
        const venta = data.venta.toFixed(2);
        const fecha = new Date(data.fechaActualizacion).toLocaleString('es-AR');

        precioElement.innerHTML = `
          Compra: $${compra}<br>
          Venta: $<span style="color:#e67e22;">${venta}</span>
        `;
        precioElement.className = '';

        // Actualiza también el footer con la hora
        document.querySelector('.footer').innerHTML = 
          `Actualizado: ${fecha} | Fuente: <a href="https://dolarapi.com" target="_blank">dolarapi.com</a>`;
        
      } catch (error) {
        precioElement.textContent = 'Error al cargar';
        precioElement.className = 'error';
        console.error(error);
      }
    }

    // Cargar al iniciar la página
    window.onload = actualizarDolar;
  </script>

</body>
</html>
